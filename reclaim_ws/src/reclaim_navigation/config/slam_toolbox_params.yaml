# SLAM Toolbox parameters — online async mode
# For RECLAIM robot with RPLIDAR A1M8 and wheel odometry
#
# Subscribes to:
#   /scan (sensor_msgs/LaserScan) — from RPLIDAR
#   /odom (nav_msgs/Odometry) — from wheel encoders via micro-ROS
# Publishes:
#   /map (nav_msgs/OccupancyGrid)
#   /tf (map -> odom transform)

slam_toolbox:
  ros__parameters:
    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS params
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping  # mapping or localization

    # Procesing rate — throttle how often we process new scans
    # Setting 0.0 means process every scan
    throttle_scans: 1
    transform_publish_period: 0.02  # 50 Hz TF publish rate

    # Map resolution (meters per cell)
    resolution: 0.05

    # Laser range — match RPLIDAR A1M8 spec
    max_laser_range: 12.0
    minimum_time_interval: 0.5

    # When to create a new scan node in the pose graph
    minimum_travel_distance: 0.3   # meters
    minimum_travel_heading: 0.3    # radians (~17 degrees)

    # Map update interval (seconds)
    map_update_interval: 2.0

    # Scan matching parameters
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation parameters — for scan matching
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop closure parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Distance variance penalty
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349  # ~0.2 degrees
    coarse_search_angle_offset: 0.349  # ~20 degrees
    coarse_angle_resolution: 0.0349    # ~2 degrees
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # TF params
    tf_buffer_duration: 30.0
    transform_timeout: 0.2

    # Debug
    debug_logging: false

    # Stack size for serialization (increase if saving large maps crashes)
    stack_size_to_use: 40000000
