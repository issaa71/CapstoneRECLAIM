# Local costmap configuration
# Small rolling window around the robot for reactive obstacle avoidance
#
# Layers: obstacle + inflation (no static layer — local costmap is sensor-only)

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0        # Hz — match scan rate
      publish_frequency: 2.0       # Hz — for visualization
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false

      # Rolling window (not tracking a global map frame)
      rolling_window: true
      width: 3                     # meters — 3m x 3m window
      height: 3
      resolution: 0.05             # 5cm cells, match SLAM resolution

      # Robot footprint — circular, 0.20m radius
      robot_radius: 0.20
      # Alternatively, for a polygonal footprint:
      # footprint: "[[0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15]]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          sensor_model: ray
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.15
          raytrace_max_range: 3.5
          raytrace_min_range: 0.15
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.25

      always_send_full_costmap: true
